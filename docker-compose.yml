version: "3.8"

services:

  # ─── Database Layer ─────────────────────────────
  mysql:
    container_name: mysql
    image: mysql:8.0
    restart: always

    # All values come from .env file — no hardcoding
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}

    ports:
      - "3306:3306"

    # Named volume: data persists even when container is removed
    volumes:
      - mysql-data:/var/lib/mysql

    networks:
      - two-tier

    # Healthcheck: confirm MySQL is actually accepting connections
    # depends_on uses this to know when MySQL is truly ready
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s

  # ─── Application Layer ──────────────────────────
  flask:
    container_name: two-tier-app
    build:
      context: .
      dockerfile: Dockerfile

    restart: always

    ports:
      - "5000:5000"

    # App reads DB connection info from environment
    environment:
      MYSQL_HOST: ${MYSQL_HOST}
      MYSQL_PORT: ${MYSQL_PORT}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DB: ${MYSQL_DATABASE}
      FLASK_ENV: ${FLASK_ENV}
      SECRET_KEY: ${SECRET_KEY}

    networks:
      - two-tier

    # Wait for mysql healthcheck to pass before starting flask
    depends_on:
      mysql:
        condition: service_healthy

    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

# ─── Volumes ────────────────────────────────────────
# Named volumes are managed by Docker
# Data survives: docker compose down
# Data deleted only with: docker compose down -v
volumes:
  mysql-data:

# ─── Networks ───────────────────────────────────────
# Custom bridge network: containers talk by service name
# flask can reach mysql at hostname "mysql"
networks:
  two-tier:
    driver: bridge